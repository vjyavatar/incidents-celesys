<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Celesys AI — Incident Management Platform</title>
<meta name="description" content="AI-powered incident management: 6 agents that observe, diagnose, fix, and verify. Reduce MTTR from 47 minutes to 5.5 minutes.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:#080C16;color:#D4D9E3;min-height:100vh}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.fade-up{animation:fadeUp .3s ease-out forwards}
.blink{animation:blink 1.2s ease-in-out infinite}
.mono{font-family:'JetBrains Mono',monospace}
pre.codeblock{background:#060910;border:1px solid #151B2E;border-radius:8px;padding:12px;font-size:11px;overflow:auto;color:#8892A8;line-height:1.6;font-family:'JetBrains Mono',monospace;white-space:pre-wrap;word-break:break-word}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#080C16}
::-webkit-scrollbar-thumb{background:#1A2138;border-radius:3px}
.back-link{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:6px;font-size:12px;color:#64748B;text-decoration:none;transition:all .2s}
.back-link:hover{color:#60A5FA;background:rgba(59,130,246,0.07)}
</style>
</head>
<body>
<div id="root"></div>
<script>
"use strict";
var h = React.createElement;
var useState = React.useState;
var useEffect = React.useEffect;
var useCallback = React.useCallback;
var useRef = React.useRef;

var STAGES=[
{id:"ingest",name:"Alert Ingestion",icon:"\u{1F6A8}",col:"#EF4444",analogy:"911 Dispatcher",humanStep:"Engineer paged at 3 AM. Opens laptop, VPN, finds broken service.",humanTime:"5\u20138 min",aiStep:"Webhook received, deduplicated, correlation ID assigned, pipeline started.",aiTime:"0.5 sec",checks:["Correlation ID assigned","Deduplication passed","State: TRIAGING","Kafka event published"],response:{status:"ACCEPTED",correlationId:"c7e3a1f0-9d2b-4e8f-b5c1-2a8d6f3e9b0c",currentState:"TRIAGING",message:"Incident created, pipeline initiated"}},
{id:"observe",name:"Observability Agent",icon:"\u{1F50D}",col:"#3B82F6",analogy:"ER Triage Nurse",humanStep:"Opens Datadog, Grafana, CloudWatch. Cross-references 4 dashboards.",humanTime:"8\u201315 min",aiStep:"Parallel queries to Datadog + Prometheus + CloudWatch. 6 metrics, 4 anomalies.",aiTime:"12 sec",checks:["3 backends queried","4 anomalies found","Confidence: 92%","Summary generated"],response:{metricsAnalyzed:6,backends:["datadog","prometheus","cloudwatch"],anomalies:[{metric:"http.error_rate_5xx",current:"23.5%",baseline:"0.5%",deviation:"+4600%"},{metric:"db.query_latency_p99",current:"2850ms",baseline:"120ms",deviation:"+2275%"}],confidence:0.92,summary:"Critical DB latency spike causing cascading HTTP 500 errors"}},
{id:"diagnose",name:"Diagnostic Agent",icon:"\u{1F9EC}",col:"#8B5CF6",analogy:"Crime Scene Detective",humanStep:"Grep Splunk logs. git log for recent deploys. Ask Slack who deployed.",humanTime:"15\u201330 min",aiStep:"Parallel: Splunk logs + GitHub commits + ArgoCD + RAG search 847 past incidents.",aiTime:"18 sec",checks:["Splunk log correlation","Commit a1b2c3d4 identified","Deploy timing match","RAG: 92% past match","Confidence: 94%"],response:{primaryHypothesis:{description:"Unindexed SQL query in commit a1b2c3d4 causing full table scans",confidence:0.94,causalChain:"New Code > Full Table Scan > Pool Exhaustion > HTTP 500s"},evidence:{logs:3,commits:1,deployments:1,pastMatch:"INC-2024-0847 (92% similar)"},suggestedActions:["ROLLBACK to v2.14.2","Add index on orders(customer_id)"]}},
{id:"remediate",name:"Action Agent",icon:"\u26A1",col:"#F59E0B",analogy:"Surgeon",humanStep:"Write kubectl command. Triple-check namespace. Get Slack approval. Run.",humanTime:"5\u201315 min",aiStep:"Risk classify, dry-run diff, rollback bookmark, auto-approve MEDIUM, execute.",aiTime:"4.2 sec",checks:["Risk: MEDIUM","Dry-run first","Bookmark saved (rev 43)","Auto-approved","Rollback: SUCCESS"],response:{actionType:"ROLLBACK",command:"kubectl rollout undo deploy/checkout-service -n production --to-revision=42",riskTier:"MEDIUM",approvalStatus:"AUTO_APPROVED",dryRunDiff:"Image: v2.14.3 > v2.14.2 | 3 pods rolling",executionStatus:"SUCCESS",durationMs:4200}},
{id:"validate",name:"Validation Agent",icon:"\u2705",col:"#10B981",analogy:"Post-Op Nurse",humanStep:"Watch dashboards 10-20 min. Eyeball metrics. Declare fixed on gut feeling.",humanTime:"10\u201320 min",aiStep:"Wait 180s, re-query all metrics, 6 statistical checks vs 24h baseline.",aiTime:"3 min + 8 sec",checks:["Wait 180s done","Error rate: 0.3%","DB latency: 95ms","6/6 checks PASS","Recommend: CLOSE"],response:{validationStatus:"CONFIRMED",checks:[{name:"Error Rate",measured:"0.3%",threshold:"< 0.65%",result:"PASS"},{name:"DB Latency",measured:"95ms",threshold:"< 156ms",result:"PASS"},{name:"CPU",measured:"38%",threshold:"< 50.75%",result:"PASS"},{name:"ALB Hosts",measured:"4/4",threshold:">=4",result:"PASS"},{name:"Synthetic",measured:"99.9%",threshold:">=99%",result:"PASS"},{name:"New Errors",measured:"0",threshold:"=0",result:"PASS"}],recommendation:"CLOSE_INCIDENT"}},
{id:"report",name:"Reporting Agent",icon:"\u{1F4CB}",col:"#6366F1",analogy:"Court Reporter",humanStep:"Write post-mortem in GDoc (or skip). Create Jira. Post Slack.",humanTime:"30\u201360 min (or never)",aiStep:"Auto-generate post-mortem + Jira ticket + Slack notify + RAG update.",aiTime:"3 sec",checks:["Post-mortem generated","Jira: INC-2026-0142","Slack notified","PagerDuty resolved","RAG updated","MTTR: 5m 30s"],response:{title:"checkout-service 500s - unindexed SQL query",jiraTicket:"INC-2026-0142",slackNotified:"#incident-response",pagerDutyResolved:true,ragUpdated:true,followUps:["P1: Add DB index","P2: CI/CD query check","P3: Circuit breaker"],totalMTTR:"5 min 30 sec"}}
];
var DURATIONS=[1000,1800,2200,1800,2400,1200];

var PLAYBOOK=[
{step:1,title:"Discovery - Feel Their Pain",time:"30 min",col:"#EF4444",goal:"Get them to say their MTTR out loud.",script:"Walk me through your last SEV1 - who got paged, how long was investigation?",questions:["What is your MTTR for SEV1?","How many engineers per incident?","Post-mortem completion rate?"],signals:[["We spend most time figuring out what changed","Diagnostic Agent sells itself"],["Post-mortems are inconsistent","Reporting Agent is the hook"],["Juniors cannot investigate alone","System IS the senior SRE"]],exit:"They tell you: MTTR, incidents/month, team size, biggest pain"},
{step:2,title:"Live Demo - Show Don't Tell",time:"45 min",col:"#3B82F6",goal:"Run the pipeline live. 47 min compressed to 5.5 min.",script:"Watch each AI agent. Diagnostic Agent correlated a Splunk log with a GitHub commit in 18 seconds.",questions:["Which monitoring tools do you use?","Deployment toolchain? K8s/Terraform?","Last SEV1? Lets replay it."],signals:[["Can it work with our Datadog?","Buying signal - imagining their stack"],["What about custom runbooks?","Thinking implementation - very good"],["Too complex for AI","80% follow patterns, automate those"]],exit:"They ask: What would it take to try this?"},
{step:3,title:"Tech Deep-Dive - Win the SREs",time:"60 min",col:"#8B5CF6",goal:"Address: what if it breaks production?",script:"4 risk tiers. LOW/MEDIUM auto-execute. HIGH/CRITICAL need Slack approval.",questions:["What would you automate today?","Your change approval process?","How do you handle rollbacks?"],signals:[["What about our database?","Show RBAC / blast radius model"],["Start with just observability?","Perfect - Observer tier $2K/mo"],["SRE lead nodding","Technical blocker cleared"]],exit:"SRE team agrees to shadow mode trial"},
{step:4,title:"Shadow Mode - Prove Risk-Free",time:"2-4 wks",col:"#F59E0B",goal:"Read-only mode against real incidents. Zero risk.",script:"Read-only Datadog/Splunk keys. 2 weeks parallel. Zero production writes.",questions:["Read-only API keys available?","Who gets weekly shadow report?","Expected incidents/week?"],signals:[["Check with security","Normal - offer SOC2 docs"],["Scope to one service?","Perfect, start narrow"],["How long until results?","Already imagining success"]],exit:"Shadow report: Diagnosed 12/14 correctly, 8x faster"},
{step:5,title:"ROI Close - VP Meeting",time:"30 min",col:"#10B981",goal:"Shadow results + math = signed contract.",script:"12/14 incidents diagnosed correctly. $8K/month saves ~$47K/month. 6x ROI.",questions:["Which tier fits?","Top 5 services or all?","Procurement process?"],signals:[["Run by finance","They are buying, ask timeline"],["Annual pricing?","Offer 15% annual discount"],["Autonomous tier?","Do not oversell, earn it"]],exit:"Signed contract, begin onboarding"}
];

var OBJECTIONS=[
{q:"What if it breaks production?",a:"4-tier risk model. HIGH/CRITICAL need Slack approval. Dry-run + rollback bookmark on every action. Start in shadow mode."},
{q:"We already have PagerDuty",a:"We integrate WITH PagerDuty. They are the alarm. We are the fire department - investigate, fix, prove it is fixed."},
{q:"Incidents too unique for AI",a:"80% follow patterns. Automate the 80%. Engineers focus on the novel 20%."},
{q:"Why not build it ourselves?",a:"About 6 months senior SRE time ($75K+). At $8K/month we are 10x cheaper and live in 2 weeks."},
{q:"Data security?",a:"Runs in YOUR K8s cluster. No data leaves your network. Read-only keys. Scoped RBAC."}
];

function Badge(props) {
  return h("span", {style:{display:"inline-block",padding:"2px 8px",borderRadius:5,fontSize:10,fontWeight:600,background:props.c+"18",color:props.c}}, props.children);
}

function App() {
  var s1 = useState("demo"); var tab = s1[0]; var setTab = s1[1];
  var s2 = useState("sim"); var mode = s2[0]; var setMode = s2[1];
  var s3 = useState(false); var running = s3[0]; var setRunning = s3[1];
  var s4 = useState(-1); var current = s4[0]; var setCurrent = s4[1];
  var s5 = useState({}); var done = s5[0]; var setDone = s5[1];
  var s6 = useState(null); var openIdx = s6[0]; var setOpenIdx = s6[1];
  var s7 = useState(0); var elapsed = s7[0]; var setElapsed = s7[1];
  var s8 = useState("http://localhost:8080"); var apiUrl = s8[0]; var setApiUrl = s8[1];
  var s9 = useState(null); var openPlay = s9[0]; var setOpenPlay = s9[1];
  var s10 = useState(null); var openObj = s10[0]; var setOpenObj = s10[1];
  var timerRef = useRef(null);
  var abortRef = useRef(false);

  useEffect(function() {
    return function() { if (timerRef.current) clearInterval(timerRef.current); };
  }, []);

  var reset = useCallback(function() {
    abortRef.current = true;
    setCurrent(-1);
    setRunning(false);
    setDone({});
    setOpenIdx(null);
    setElapsed(0);
    if (timerRef.current) { clearInterval(timerRef.current); timerRef.current = null; }
  }, []);

  var runSim = useCallback(function() {
    reset();
    setTimeout(function() {
      abortRef.current = false;
      setRunning(true);
      var t0 = Date.now();
      timerRef.current = setInterval(function() { setElapsed(Date.now() - t0); }, 80);
      var i = 0;
      function go() {
        if (abortRef.current || i >= STAGES.length) {
          setRunning(false);
          if (timerRef.current) clearInterval(timerRef.current);
          return;
        }
        var sid = STAGES[i].id;
        var dur = DURATIONS[i];
        var ci = i;
        setCurrent(i);
        setOpenIdx(i);
        setTimeout(function() {
          if (abortRef.current) return;
          setDone(function(prev) {
            var next = {};
            for (var k in prev) next[k] = prev[k];
            next[sid] = STAGES[ci].response;
            return next;
          });
          i++;
          setTimeout(go, 250);
        }, dur);
      }
      go();
    }, 50);
  }, [reset]);

  function fmt(ms) {
    var s = ms / 1000;
    if (s >= 60) return Math.floor(s / 60) + "m " + Math.floor(s % 60) + "s";
    return s.toFixed(1) + "s";
  }

  var dc = Object.keys(done).length;
  var allDone = dc === STAGES.length;

  function handleRun() {
    if (running) { reset(); } else { runSim(); }
  }

  // ---- RENDER ----
  var headerRight = [];
  if (running || dc > 0) {
    headerRight.push(
      h("span", {key:"timer", className:"mono", style:{fontSize:16, color:allDone?"#10B981":"#60A5FA"}},
        allDone ? "\u2705 " : "", fmt(elapsed))
    );
  }
  if (tab === "demo") {
    headerRight.push(
      h("button", {key:"btn", onClick:handleRun, style:{padding:"10px 24px",borderRadius:9,border:"none",cursor:"pointer",background:running?"#EF4444":"linear-gradient(135deg,#3B82F6,#6366F1)",color:"#fff",fontWeight:700,fontSize:14,fontFamily:"inherit"}},
        running ? "\u23F9 Stop" : dc > 0 ? "\u21BB Replay" : "\u25B6 Run Pipeline")
    );
  }

  var tabs = [
    {k:"demo", l:"\u25B6 Pipeline"},
    {k:"playbook", l:"\u{1F4D6} Sales Playbook"},
    {k:"config", l:"\u{1F50C} Config"}
  ];

  var modes = [
    {k:"sim", l:"\u{1F3AC} Simulated", s:"No backend needed"},
    {k:"compare", l:"\u2694\uFE0F Human vs AI", s:"Side by side"},
    {k:"live", l:"\u{1F534} Live API", s:apiUrl}
  ];

  // Stage cards
  var stageCards = STAGES.map(function(stg, i) {
    var isActive = current === i && !done[stg.id];
    var isDone = !!done[stg.id];
    var isOpen = openIdx === i;
    var resp = done[stg.id] || null;

    var badges = [];
    badges.push(h("span", {key:"name", style:{fontSize:13,fontWeight:700,color:isDone||isActive?stg.col:"#4D5571"}}, stg.name));
    if (isActive) badges.push(h("span", {key:"proc", className:"blink"}, h(Badge, {c:stg.col}, "PROCESSING")));
    if (isDone) badges.push(h(Badge, {key:"done", c:"#10B981"}, "DONE \u2713"));

    var expanded = null;
    if (isOpen) {
      var parts = [];

      // Human vs AI
      parts.push(
        h("div", {key:"cmp", style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}},
          h("div", {style:{padding:12,borderRadius:8,background:"#EF444408",border:"1px solid #EF444418"}},
            h("div", {style:{fontSize:10,fontWeight:700,color:"#EF4444",marginBottom:6}}, "\u{1F464} HUMAN"),
            h("div", {style:{fontSize:11,color:"#8892A8",lineHeight:1.6,marginBottom:4}}, stg.humanStep),
            h("div", {className:"mono",style:{fontSize:16,fontWeight:700,color:"#EF4444"}}, stg.humanTime)
          ),
          h("div", {style:{padding:12,borderRadius:8,background:"#10B98108",border:"1px solid #10B98118"}},
            h("div", {style:{fontSize:10,fontWeight:700,color:"#10B981",marginBottom:6}}, "\u{1F916} AI AGENT"),
            h("div", {style:{fontSize:11,color:"#8892A8",lineHeight:1.6,marginBottom:4}}, stg.aiStep),
            h("div", {className:"mono",style:{fontSize:16,fontWeight:700,color:"#10B981"}}, stg.aiTime)
          )
        )
      );

      // Checks
      if (isDone) {
        parts.push(
          h("div", {key:"chk", style:{marginBottom:14}},
            h("div", {style:{fontSize:10,fontWeight:700,color:"#3D4663",letterSpacing:1.5,marginBottom:8}}, "CHECKS"),
            h("div", {style:{display:"flex",flexWrap:"wrap",gap:5}},
              stg.checks.map(function(c, ci) { return h(Badge, {key:ci, c:"#10B981"}, "\u2713 " + c); })
            )
          )
        );
      }

      // JSON output
      if (isDone && resp) {
        parts.push(
          h("div", {key:"json"},
            h("div", {className:"mono",style:{fontSize:10,fontWeight:700,color:stg.col,letterSpacing:1.5,marginBottom:6}}, "AGENT OUTPUT"),
            h("pre", {className:"codeblock"}, JSON.stringify(resp, null, 2))
          )
        );
      }

      expanded = h("div", {className:"fade-up", onClick:function(ev){ev.stopPropagation();}, style:{marginTop:14,paddingTop:14,borderTop:"1px solid #151B2E"}}, parts);
    }

    return h("div", {key:stg.id, onClick:function(){setOpenIdx(isOpen?null:i);}, style:{background:"#0D1220",border:"1px solid "+(isActive?stg.col+"60":isDone?stg.col+"30":"#1A2138"),borderRadius:12,padding:18,marginBottom:8,cursor:"pointer",opacity:(!isDone&&!isActive&&current>=0)?0.35:1,transition:"all .2s"}},
      h("div", {style:{display:"flex",alignItems:"center",gap:12}},
        h("span", {style:{fontSize:26}}, stg.icon),
        h("div", {style:{flex:1}},
          h("div", {style:{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}, badges),
          h("div", {style:{fontSize:11,color:"#4D5571",marginTop:2}}, '"' + stg.analogy + '"')
        ),
        h("span", {style:{color:"#2D3555",fontSize:14}}, isOpen ? "\u25BE" : "\u25B8")
      ),
      expanded
    );
  });

  // Completion summary
  var completionBox = null;
  if (allDone) {
    completionBox = h("div", {className:"fade-up",style:{background:"#0D1220",border:"1px solid #10B98130",borderRadius:12,padding:24,marginTop:8,textAlign:"center"}},
      h("div", {style:{fontSize:11,fontWeight:700,color:"#10B981",letterSpacing:2,marginBottom:8}}, "INCIDENT RESOLVED"),
      h("div", {className:"mono",style:{fontSize:28,fontWeight:700,color:"#10B981"}}, "5 min 30 sec MTTR"),
      h("div", {style:{color:"#4D5571",fontSize:12,marginTop:4}}, "vs. industry avg 47 min (87% faster)"),
      h("div", {style:{display:"flex",justifyContent:"center",gap:24,marginTop:16}},
        [["Agents","6"],["Checks","27"],["Human","0"],["Events","6"]].map(function(x) {
          return h("div", {key:x[0]},
            h("div", {className:"mono",style:{fontSize:18,fontWeight:700,color:"#E8ECF4"}}, x[1]),
            h("div", {style:{fontSize:10,color:"#4D5571"}}, x[0])
          );
        })
      ),
      h("div", {style:{marginTop:16}},
        h("a", {href:"mailto:contact@celesys.ai?subject=Incident%20AI%20Demo", style:{display:"inline-block",padding:"10px 28px",borderRadius:9,background:"linear-gradient(135deg,#3B82F6,#6366F1)",color:"#fff",fontWeight:700,fontSize:14,textDecoration:"none"}}, "\u{1F4E7} Request Full Demo")
      )
    );
  }

  // Playbook cards
  var playbookCards = PLAYBOOK.map(function(p, i) {
    var isOpenP = openPlay === i;
    var expandedP = null;
    if (isOpenP) {
      expandedP = h("div", {className:"fade-up", onClick:function(ev){ev.stopPropagation();}, style:{marginTop:16,paddingTop:16,borderTop:"1px solid #151B2E"}},
        h("div", {style:{marginBottom:14}},
          h("div", {style:{fontSize:10,fontWeight:700,color:"#F59E0B",letterSpacing:1.5,marginBottom:6}}, "\u{1F4AC} SAY THIS"),
          h("div", {style:{fontSize:12,color:"#B8BFD1",lineHeight:1.8,padding:14,background:"#F59E0B06",border:"1px solid #F59E0B15",borderRadius:8,fontStyle:"italic"}}, '"' + p.script + '"')
        ),
        h("div", {style:{marginBottom:14}},
          h("div", {style:{fontSize:10,fontWeight:700,color:"#3B82F6",letterSpacing:1.5,marginBottom:6}}, "ASK"),
          p.questions.map(function(q, qi) {
            return h("div", {key:qi, style:{fontSize:12,color:"#8892A8",padding:"4px 0"}}, h("span", {style:{color:"#3B82F6"}}, "> "), q);
          })
        ),
        h("div", {style:{marginBottom:14}},
          h("div", {style:{fontSize:10,fontWeight:700,color:"#A78BFA",letterSpacing:1.5,marginBottom:6}}, "BUYING SIGNALS"),
          p.signals.map(function(sig, si) {
            return h("div", {key:si, style:{fontSize:12,padding:"4px 0",display:"flex",gap:6,flexWrap:"wrap"}},
              h("span", {style:{color:"#EF4444"}}, '"' + sig[0] + '"'),
              h("span", {style:{color:"#10B981"}}, " > " + sig[1])
            );
          })
        ),
        h("div", {style:{padding:12,borderRadius:8,background:"#10B98108",border:"1px solid #10B98118"}},
          h("div", {style:{fontSize:10,fontWeight:700,color:"#10B981",marginBottom:4}}, "MOVE ON WHEN:"),
          h("div", {style:{fontSize:12,color:"#8892A8"}}, p.exit)
        )
      );
    }
    return h("div", {key:i, onClick:function(){setOpenPlay(isOpenP?null:i);}, style:{background:"#0D1220",border:"1px solid "+(isOpenP?p.col+"40":"#1A2138"),borderRadius:12,padding:18,marginBottom:8,cursor:"pointer"}},
      h("div", {style:{display:"flex",alignItems:"center",gap:12}},
        h("div", {style:{width:32,height:32,borderRadius:"50%",background:p.col+"18",border:"2px solid "+p.col,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:700,color:p.col,flexShrink:0}}, p.step),
        h("div", {style:{flex:1}},
          h("div", {style:{fontSize:14,fontWeight:700,color:p.col}}, p.title),
          h("div", {style:{fontSize:11,color:"#4D5571"}}, p.goal)
        ),
        h(Badge, {c:"#3D4663"}, p.time),
        h("span", {style:{color:"#2D3555"}}, isOpenP ? "\u25BE" : "\u25B8")
      ),
      expandedP
    );
  });

  // Objection cards
  var objCards = OBJECTIONS.map(function(o, i) {
    var isOpenO = openObj === i;
    return h("div", {key:i, onClick:function(){setOpenObj(isOpenO?null:i);}, style:{background:"#0D1220",border:"1px solid #1A2138",borderRadius:12,padding:16,marginBottom:6,cursor:"pointer"}},
      h("div", {style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
        h("span", {style:{fontSize:13,fontWeight:600,color:"#EF4444"}}, '"' + o.q + '"'),
        h("span", {style:{color:"#2D3555"}}, isOpenO ? "\u25BE" : "\u25B8")
      ),
      isOpenO ? h("div", {className:"fade-up", onClick:function(ev){ev.stopPropagation();}, style:{marginTop:10,padding:12,borderRadius:8,background:"#10B98108",border:"1px solid #10B98118"}},
        h("div", {style:{fontSize:12,color:"#B8BFD1",lineHeight:1.7}}, "> " + o.a)
      ) : null
    );
  });

  // Pricing tiers
  var tiers = [{n:"Observer",p:"$2K/mo",d:"Observe + Diagnose",t:"AI investigation only"},{n:"Responder",p:"$8K/mo",d:"+ Action + Reporting",t:"Auto-remediation"},{n:"Autonomous",p:"$18K/mo",d:"All + Validation + RAG",t:"Full self-healing"}];

  // === MAIN RETURN ===
  return h("div", {style:{minHeight:"100vh"}},

    // HEADER
    h("div", {style:{padding:"16px 24px 12px",borderBottom:"1px solid #151B2E"}},
      h("div", {style:{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}},
        h("div", null,
          h("a", {href:"https://celesys.ai",className:"back-link"}, "\u2190 Back to Celesys AI"),
